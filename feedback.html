<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Oops Mart</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f8f9fa;
        }

        .hero{
            background:#0d6efd;
            color:white;
            padding:60px;
            text-align:center;
            margin-top:50px;
        }

        .feedback-box{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,.15);
        }

        footer{
            background:#212529;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:50px;
        }
    </style>

</head>
<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">

<div class="container">

<a class="navbar-brand" href="#">Oops Mart</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">Home</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="feedback.html">Feedback</a>
</li>

</ul>

</div>

</div>

</nav>

<!-- Hero Section -->

<div class="hero">

<h1>Oops Mart Feedback</h1>

<p>Your opinion is valuable for improving this project.</p>

</div>

<!-- Feedback Form -->

<div class="container my-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="feedback-box">

<h2 class="text-center mb-4">Send Your Feedback</h2>

<form action="https://formsubmit.co/me.alone329@gmail.com" method="POST">

<!-- Hidden Settings -->
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="Oops Mart Feedback">

<!-- Name -->

<div class="mb-3">

<label class="form-label">Full Name</label>

<input type="text"
class="form-control"
name="Name"
placeholder="Enter your full name"
required>

</div>

<!-- Email -->

<div class="mb-3">

<label class="form-label">Email Address</label>

<input type="email"
class="form-control"
name="Email"
placeholder="Enter your email"
required>

</div>

<!-- Rating -->

<div class="mb-3">

<label class="form-label">Project Rating</label>

<select class="form-select" name="Rating">

<option>⭐⭐⭐⭐⭐ Excellent</option>
<option>⭐⭐⭐⭐ Very Good</option>
<option>⭐⭐⭐ Good</option>
<option>⭐⭐ Average</option>
<option>⭐ Poor</option>

</select>

</div>

<!-- Feedback -->

<div class="mb-3">

<label class="form-label">Your Feedback</label>

<textarea class="form-control"
rows="6"
name="Feedback"
placeholder="Write your feedback..."
required></textarea>

</div>

<!-- Submit Button -->

<div class="d-grid">

<button type="submit"
class="btn btn-primary btn-lg">

Submit Feedback

</button>

</div>

</form>

</div>

</div>

</div>

</div>

<!-- Footer -->

<footer>

<h4>Oops Mart</h4>

<p>Front-End Development Practice Project</p>

<hr>

<p>© 2026 Oops Mart. All Rights Reserved.</p>

</footer>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
